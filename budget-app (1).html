<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Budget" />
  <meta name="theme-color" content="#0F172A" />
  <title>Budget</title>

  <style>
    /* ── TOKENS ── */
    :root {
      --navy:    #0F172A;
      --navy2:   #1E293B;
      --slate:   #334155;
      --mid:     #64748B;
      --muted:   #94A3B8;
      --border:  #E2E8F0;
      --surface: #F8FAFC;
      --white:   #FFFFFF;
      --amber:   #F59E0B;
      --amber2:  #D97706;
      --green:   #10B981;
      --red:     #EF4444;
      --radius:  14px;
      --radius-sm: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: var(--navy);
      color: var(--white);
      -webkit-font-smoothing: antialiased;
    }

    /* ── SCREENS ── */
    .screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .screen.hidden {
      display: none;
    }

    /* PIN screen: fixed full-viewport overlay */
    #pin-screen {
      position: fixed;
      inset: 0;
    }

    /* App screen: normal document flow so it scrolls naturally */
    #app-screen {
      min-height: 100vh;
      align-items: stretch;
      justify-content: flex-start;
    }

    /* ── PIN SCREEN ── */
    #pin-screen {
      background: var(--navy);
      padding: 40px 32px;
      gap: 0;
    }

    .pin-logo {
      width: 64px;
      height: 64px;
      background: var(--amber);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      font-size: 28px;
    }

    .pin-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
      text-align: center;
    }

    .pin-subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 40px;
      text-align: center;
    }

    .pin-dots {
      display: flex;
      gap: 14px;
      margin-bottom: 40px;
    }

    .pin-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid var(--slate);
      background: transparent;
      transition: background 0.15s, border-color 0.15s;
    }

    .pin-dot.filled {
      background: var(--amber);
      border-color: var(--amber);
    }

    .pin-dot.error {
      background: var(--red);
      border-color: var(--red);
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 72px);
      grid-template-rows: repeat(4, 72px);
      gap: 12px;
    }

    .key {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: none;
      background: var(--navy2);
      color: var(--white);
      font-size: 22px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .key:active { background: var(--slate); transform: scale(0.94); }
    .key.empty { background: transparent; pointer-events: none; }

    .key.del {
      background: transparent;
      font-size: 18px;
      color: var(--muted);
    }
    .key.del:active { background: var(--navy2); }

    .pin-error {
      margin-top: 20px;
      font-size: 13px;
      color: var(--red);
      height: 18px;
      text-align: center;
    }

    /* ── MAIN APP SCREEN ── */
    #app-screen {
      background: var(--surface);
      padding-bottom: env(safe-area-inset-bottom, 20px);
    }

    /* Header */
    .app-header {
      background: var(--navy);
      padding: 56px 20px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 36px;
      height: 36px;
      background: var(--amber);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header-date {
      font-size: 12px;
      color: var(--muted);
    }

    .lock-btn {
      background: var(--navy2);
      border: none;
      color: var(--muted);
      font-size: 18px;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    /* Form card */
    .form-card {
      background: var(--white);
      margin: 16px;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .form-section {
      padding: 16px 16px 0;
    }

    .form-section:last-child { padding-bottom: 16px; }

    .field-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 8px;
    }

    .field-divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0;
    }

    /* Category chips */
    .group-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      margin-top: 4px;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 12px;
    }

    .chip {
      padding: 7px 13px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--white);
      color: var(--slate);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      white-space: nowrap;
    }

    .chip:active { transform: scale(0.95); }

    .chip.selected {
      background: var(--navy);
      border-color: var(--navy);
      color: var(--white);
    }

    /* Amount row */
    .amount-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .type-toggle {
      display: flex;
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 3px;
      flex-shrink: 0;
    }

    .toggle-btn {
      padding: 6px 11px;
      border-radius: 6px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      background: transparent;
      color: var(--mid);
    }

    .toggle-btn.active-out {
      background: var(--navy);
      color: var(--white);
    }

    .toggle-btn.active-in {
      background: var(--green);
      color: var(--white);
    }

    .amount-input-wrap {
      flex: 1;
      position: relative;
    }

    .currency-symbol {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 17px;
      font-weight: 600;
      color: var(--slate);
      pointer-events: none;
    }

    input[type="number"], input[type="text"], input[type="date"], textarea {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--navy);
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="number"]:focus,
    input[type="text"]:focus,
    input[type="date"]:focus,
    textarea:focus {
      border-color: var(--amber);
    }

    input[type="number"] {
      padding: 10px 12px 10px 28px;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    input[type="date"] {
      padding: 10px 12px;
      color: var(--navy);
    }

    textarea {
      padding: 10px 12px;
      resize: none;
      height: 80px;
      line-height: 1.5;
    }

    /* Submit */
    .submit-btn {
      display: block;
      width: calc(100% - 32px);
      margin: 0 16px 16px;
      padding: 16px;
      background: var(--amber);
      color: var(--navy);
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      letter-spacing: -0.2px;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .submit-btn:active { background: var(--amber2); transform: scale(0.98); }
    .submit-btn:disabled { background: var(--muted); cursor: not-allowed; transform: none; }

    /* Config card */
    .config-card {
      background: var(--white);
      margin: 0 16px 16px;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .config-toggle {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .config-toggle-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--mid);
    }

    .config-toggle-icon {
      font-size: 12px;
      color: var(--muted);
      transition: transform 0.2s;
    }

    .config-toggle-icon.open { transform: rotate(180deg); }

    .config-body {
      padding: 0 16px 16px;
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    .config-body.open { display: flex; }

    .config-body input {
      padding: 10px 12px;
    }

    .config-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 4px;
    }

    .save-config-btn {
      padding: 11px;
      background: var(--navy);
      color: var(--white);
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 20px) + 20px);
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--navy);
      color: var(--white);
      padding: 13px 22px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 999;
      pointer-events: none;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--green); }
    .toast.error   { background: var(--red); }

    /* Shake animation for wrong PIN */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px); }
      40%       { transform: translateX(8px); }
      60%       { transform: translateX(-6px); }
      80%       { transform: translateX(6px); }
    }
    .shake { animation: shake 0.4s ease; }
  </style>
</head>
<body>

<!-- ══════════════════════════════════
     PIN SCREEN
══════════════════════════════════ -->
<div id="pin-screen" class="screen">
  <div class="pin-logo">💰</div>
  <div class="pin-title">Budget</div>
  <div class="pin-subtitle">Enter your PIN to continue</div>

  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>

  <div class="keypad" id="keypad">
    <button class="key" data-val="1">1</button>
    <button class="key" data-val="2">2</button>
    <button class="key" data-val="3">3</button>
    <button class="key" data-val="4">4</button>
    <button class="key" data-val="5">5</button>
    <button class="key" data-val="6">6</button>
    <button class="key" data-val="7">7</button>
    <button class="key" data-val="8">8</button>
    <button class="key" data-val="9">9</button>
    <button class="key empty"></button>
    <button class="key" data-val="0">0</button>
    <button class="key del" id="del-key">⌫</button>
  </div>

  <div class="pin-error" id="pin-error"></div>
</div>

<!-- ══════════════════════════════════
     MAIN APP SCREEN
══════════════════════════════════ -->
<div id="app-screen" class="screen hidden">

  <div class="app-header">
    <div class="header-left">
      <div class="header-icon">💰</div>
      <div>
        <div class="header-title">Budget</div>
        <div class="header-date" id="header-date"></div>
      </div>
    </div>
    <button class="lock-btn" id="lock-btn" title="Lock app">🔒</button>
  </div>

  <div class="form-card">
    <div class="form-section">
      <div class="field-label">Category</div>
      <div id="category-picker"></div>
    </div>

    <div class="field-divider" style="margin: 0 16px;"></div>

    <div class="form-section">
      <div class="field-label">Amount</div>
      <div class="amount-row">
        <div class="type-toggle">
          <button class="toggle-btn active-out" id="btn-out" onclick="setType('out')">− Out</button>
          <button class="toggle-btn" id="btn-in"  onclick="setType('in')">+ In</button>
        </div>
        <div class="amount-input-wrap">
          <span class="currency-symbol">$</span>
          <input type="number" id="amount-input" placeholder="0.00" min="0" step="0.01" inputmode="decimal" />
        </div>
      </div>
    </div>

    <div class="field-divider" style="margin: 0 16px;"></div>

    <div class="form-section">
      <div class="field-label">Date</div>
      <input type="date" id="date-input" />
    </div>

    <div class="field-divider" style="margin: 0 16px;"></div>

    <div class="form-section" style="padding-bottom: 16px;">
      <div class="field-label">Notes</div>
      <textarea id="notes-input" placeholder="Where and what was purchased…"></textarea>
    </div>
  </div>

  <button class="submit-btn" id="submit-btn" onclick="submitEntry()">Log Entry</button>

  <!-- Settings -->
  <div class="config-card">
    <div class="config-toggle" onclick="toggleConfig()">
      <span class="config-toggle-label">⚙️ &nbsp;Settings</span>
      <span class="config-toggle-icon" id="config-icon">▼</span>
    </div>
    <div class="config-body" id="config-body">
      <div>
        <div class="config-label">Apps Script URL</div>
        <input type="text" id="cfg-url" placeholder="https://script.google.com/macros/s/…/exec" />
      </div>
      <div>
        <div class="config-label">Secret Token</div>
        <input type="text" id="cfg-token" placeholder="your-secret-token" />
      </div>
      <div>
        <div class="config-label">Change PIN</div>
        <input type="text" id="cfg-pin" placeholder="4-digit PIN" maxlength="4" inputmode="numeric" />
      </div>
      <button class="save-config-btn" onclick="saveConfig()">Save Settings</button>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════
// CATEGORIES (from your sheet)
// ══════════════════════════════════
const CATEGORIES = {
  'GIVING':         ['Church Giving'],
  'SAVINGS':        ['Emergency Fund', 'General Savings', 'Checking', 'ksavings', 'kchecking', 'kcar', 'kemergency', 'kextra'],
  'HOUSING':        ['Phone', 'Music', 'Rent', 'Gas & Electric', 'apartment amenities', 'renters insurance', 'INTERNET'],
  'TRANSPORTATION': ['Vehicle Maintenance', 'Gas', 'Car Insurance', 'triple AAA'],
  'FOOD':           ['Food out', 'Groceries'],
  'LIFESTYLE':      ['Kmoney', 'Dmoney', 'Kclothing', 'Dclothing', 'subscriptions', 'Misc', 'Hobbies', 'Dates', 'Money gifted to us', 'house stuff', 'Friend Benevolence', 'Gifts', 'Fun/Events'],
};

// ══════════════════════════════════
// STATE
// ══════════════════════════════════
let selectedCategory = null;
let transactionType  = 'out'; // 'out' = withdrawal, 'in' = deposit
let pinBuffer        = '';
const PIN_LENGTH     = 4;

// ══════════════════════════════════
// STORAGE HELPERS
// ══════════════════════════════════
function getPin()   { return localStorage.getItem('budget_pin')   || '0000'; }
function getUrl()   { return localStorage.getItem('budget_url')   || ''; }
function getToken() { return localStorage.getItem('budget_token') || ''; }
function isUnlocked() { return sessionStorage.getItem('budget_unlocked') === '1'; }
function setUnlocked() { sessionStorage.setItem('budget_unlocked', '1'); }
function clearUnlocked() { sessionStorage.removeItem('budget_unlocked'); }

// ══════════════════════════════════
// BOOT
// ══════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  buildCategoryPicker();
  setDefaultDate();
  updateHeaderDate();
  loadConfigFields();

  if (isUnlocked()) {
    showApp();
  }

  // Keypad
  document.querySelectorAll('.key[data-val]').forEach(btn => {
    btn.addEventListener('click', () => pressKey(btn.dataset.val));
  });
  document.getElementById('del-key').addEventListener('click', deleteKey);
  document.getElementById('lock-btn').addEventListener('click', lockApp);
});

// ══════════════════════════════════
// CATEGORY PICKER
// ══════════════════════════════════
function buildCategoryPicker() {
  const picker = document.getElementById('category-picker');
  picker.innerHTML = '';
  for (const [group, items] of Object.entries(CATEGORIES)) {
    const label = document.createElement('div');
    label.className = 'group-label';
    label.textContent = group;
    picker.appendChild(label);

    const row = document.createElement('div');
    row.className = 'chip-row';
    items.forEach(cat => {
      const chip = document.createElement('button');
      chip.className = 'chip';
      chip.textContent = cat;
      chip.addEventListener('click', () => selectCategory(cat, chip));
      row.appendChild(chip);
    });
    picker.appendChild(row);
  }
}

function selectCategory(cat, chipEl) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  chipEl.classList.add('selected');
  selectedCategory = cat;
}

// ══════════════════════════════════
// TRANSACTION TYPE
// ══════════════════════════════════
function setType(type) {
  transactionType = type;
  const btnOut = document.getElementById('btn-out');
  const btnIn  = document.getElementById('btn-in');
  btnOut.className = 'toggle-btn' + (type === 'out' ? ' active-out' : '');
  btnIn.className  = 'toggle-btn' + (type === 'in'  ? ' active-in'  : '');
}

// ══════════════════════════════════
// DATE HELPERS
// ══════════════════════════════════
function todayISO() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function setDefaultDate() {
  document.getElementById('date-input').value = todayISO();
}

function updateHeaderDate() {
  const el = document.getElementById('header-date');
  el.textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

function formatDateForSheet(iso) {
  // Convert YYYY-MM-DD to MM/DD/YYYY for the sheet
  const [y, m, d] = iso.split('-');
  return `${m}/${d}/${y}`;
}

// ══════════════════════════════════
// SUBMIT
// ══════════════════════════════════
async function submitEntry() {
  const amount = parseFloat(document.getElementById('amount-input').value);
  const date   = document.getElementById('date-input').value;
  const notes  = document.getElementById('notes-input').value.trim();
  const url    = getUrl();
  const token  = getToken();

  if (!selectedCategory) { showToast('Please select a category', 'error'); return; }
  if (!amount || amount <= 0) { showToast('Please enter an amount', 'error'); return; }
  if (!date) { showToast('Please enter a date', 'error'); return; }
  if (!url) { showToast('Add your Apps Script URL in Settings ⚙️', 'error'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Logging…';

  // Amount: positive for deposit (in), negative for withdrawal (out)
  const signedAmount = transactionType === 'in' ? Math.abs(amount) : -Math.abs(amount);

  const payload = {
    token:    token,
    category: selectedCategory,
    amount:   signedAmount,
    date:     formatDateForSheet(date),
    notes:    notes,
  };

  try {
    await fetch(url, {
      method:  'POST',
      mode:    'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload),
    });

    // no-cors means we can't read the response, so we optimistically succeed
    showToast('✓ Entry logged!', 'success');
    resetForm();
  } catch (err) {
    showToast('Network error — try again', 'error');
  }

  btn.disabled = false;
  btn.textContent = 'Log Entry';
}

function resetForm() {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  selectedCategory = null;
  document.getElementById('amount-input').value = '';
  document.getElementById('notes-input').value  = '';
  document.getElementById('date-input').value   = todayISO();
  setType('out');
  // Scroll back to top
  document.getElementById('app-screen').scrollTo({ top: 0, behavior: 'smooth' });
}

// ══════════════════════════════════
// PIN LOGIC
// ══════════════════════════════════
function pressKey(val) {
  if (pinBuffer.length >= PIN_LENGTH) return;
  pinBuffer += val;
  updateDots();
  if (pinBuffer.length === PIN_LENGTH) {
    setTimeout(checkPin, 120);
  }
}

function deleteKey() {
  pinBuffer = pinBuffer.slice(0, -1);
  updateDots(false);
  document.getElementById('pin-error').textContent = '';
}

function updateDots(filled = true) {
  for (let i = 0; i < PIN_LENGTH; i++) {
    const dot = document.getElementById(`d${i}`);
    dot.classList.toggle('filled', i < pinBuffer.length);
    dot.classList.remove('error');
  }
}

function checkPin() {
  if (pinBuffer === getPin()) {
    setUnlocked();
    showApp();
  } else {
    // shake & show error
    for (let i = 0; i < PIN_LENGTH; i++) {
      const dot = document.getElementById(`d${i}`);
      dot.classList.remove('filled');
      dot.classList.add('error');
    }
    document.getElementById('pin-dots').classList.add('shake');
    document.getElementById('pin-error').textContent = 'Incorrect PIN';
    setTimeout(() => {
      document.getElementById('pin-dots').classList.remove('shake');
    }, 400);
    pinBuffer = '';
  }
}

function showApp() {
  document.getElementById('pin-screen').classList.add('hidden');
  document.getElementById('app-screen').classList.remove('hidden');
}

function lockApp() {
  clearUnlocked();
  pinBuffer = '';
  updateDots();
  document.getElementById('pin-error').textContent = '';
  document.getElementById('app-screen').classList.add('hidden');
  document.getElementById('pin-screen').classList.remove('hidden');
}

// ══════════════════════════════════
// CONFIG / SETTINGS
// ══════════════════════════════════
function toggleConfig() {
  const body = document.getElementById('config-body');
  const icon = document.getElementById('config-icon');
  const open = body.classList.toggle('open');
  icon.classList.toggle('open', open);
}

function loadConfigFields() {
  document.getElementById('cfg-url').value   = getUrl();
  document.getElementById('cfg-token').value = getToken();
}

function saveConfig() {
  const url   = document.getElementById('cfg-url').value.trim();
  const token = document.getElementById('cfg-token').value.trim();
  const pin   = document.getElementById('cfg-pin').value.trim();

  if (url)   localStorage.setItem('budget_url',   url);
  if (token) localStorage.setItem('budget_token', token);
  if (pin) {
    if (pin.length !== 4 || !/^\d{4}$/.test(pin)) {
      showToast('PIN must be exactly 4 digits', 'error');
      return;
    }
    localStorage.setItem('budget_pin', pin);
  }

  showToast('Settings saved ✓', 'success');
  toggleConfig();
}

// ══════════════════════════════════
// TOAST
// ══════════════════════════════════
let toastTimer = null;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ` ${type}` : '') + ' show';
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.classList.remove('show'); }, 2800);
}
</script>
